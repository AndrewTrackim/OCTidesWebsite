<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC Tides</title>
    <link rel="icon" href="ocTidesAppIcon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">


    <style>
        body {
            margin: 0;
            font-family: 'Catamaran', sans-serif;
            color: #025bba;
            background: #eae7e4;
        }

        .header {
            color: #eae7e4;
            padding: 20px;
            text-align: left;
            vertical-align: top;
            position: relative;
            background: url(Assets/wave.png);
            background-size: auto 100%;
            height: 170px;
        }

        .component {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 400px;
            padding: 100px 20vw;
        }

        a:link {
            color: #025bba;
            background-color: transparent;
        }

        a:visited {
            color: #025bba;
            background-color: transparent;
        }

        a:hover {
            color: #025bba;
            background-color: transparent;
            text-decoration: underline;
        }

        a:active {
            color: #025bba;
            background-color: transparent;
            text-decoration: underline;
        }

        th, td {
  padding-top: 5px;
  padding-bottom: 5px;
  padding-left: 20px;
  padding-right: 20px;
}

    table:not(#eventsTable) tr:nth-child(even) {background-color: #025bba; color: #eae7e4;}

    /* Events table visuals: use mild striping, divider, and distinct future row */
    #eventsTable { table-layout: fixed; width: 100%; }
    #eventsTable thead th { border-bottom: 2px solid #025bba; }
    #eventsTable tbody tr { border-top: 1px solid rgba(0,0,0,0.06); color: #012b5a; }
    #eventsTable tbody tr:nth-child(odd) { background-color: #ffffff; }
    #eventsTable tbody tr:nth-child(even) { background-color: #f2f7fb; }
    #eventsTable tbody tr.future { background-color: #013a7a; color: #ffffff; }
    #eventsTable tbody tr.future td { color: #ffffff; }
    #eventsTable th:nth-child(1), #eventsTable td:nth-child(1) { width: 38%; }
    #eventsTable th:nth-child(2), #eventsTable td:nth-child(2) { width: 18%; }
    #eventsTable th:nth-child(3), #eventsTable td:nth-child(3) { width: 18%; }
    #eventsTable th:nth-child(4), #eventsTable td:nth-child(4) { width: 26%; }

    .controls-row,
    .events-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: center;
    }
    .controls-row .control-item,
    .events-controls .control-item {
        display: flex;
        flex-direction: column;
        min-width: 160px;
        flex: 1 1 180px;
    }
    .controls-row .control-item label,
    .events-controls .control-item label {
        margin-bottom: 4px;
    }
    .controls-row input,
    .controls-row select,
    .events-controls input,
    .events-controls button {
        width: 100%;
        max-width: 100%;
    }
    @media (max-width: 768px) {
        .controls-row .control-item,
        .events-controls .control-item {
            min-width: 100%;
            flex: 1 1 100%;
        }
        .controls-row,
        .events-controls {
            gap: 10px;
        }
    }
        
    </style>
</head>
<body>
    <section class="header">
        <h1 style = "font-size: 40px">OC Tides</h1>
    </section>
    <div class="container">
        <div class="row mt-5">
                <div class="mb-3 controls-row">
                    <div class="control-item">
                        <label for="startPicker" class="form-label">Start:</label>
                        <input type="datetime-local" id="startPicker" class="form-control" />
                    </div>
                    <div class="control-item">
                        <label for="endPicker" class="form-label">End:</label>
                        <input type="datetime-local" id="endPicker" class="form-control" />
                    </div>
                    <div class="control-item" style="flex: 0 0 auto; align-self: flex-end;">
                        <button id="applyRangeButton" class="btn btn-primary">Apply</button>
                    </div>
                    <div class="control-item" style="flex: 0 0 auto; align-self: flex-end;">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="futureSwitch">
                            <label class="form-check-label" for="futureSwitch">Show future tides</label>
                        </div>
                    </div>
                    <div class="control-item">
                        <label class="form-label">Prediction:</label>
                        <select id="predictionMode" class="form-select">
                            <option value="simple">Simple (scipy)</option>
                            <option value="utide">Advanced (UTide)</option>
                        </select>
                    </div>
                </div>
                <canvas id="past"></canvas>
                <!-- <a href="enlarged.html">enlarge graph</a> -->
        </div>
        <div class="row mt-5">
            <div class="col" align="center">
                <div class="events-controls mb-3">
                    <div class="control-item">
                        <label for="eventsStart" class="form-label">Start:</label>
                        <input type="date" id="eventsStart" class="form-control" />
                    </div>
                    <div class="control-item">
                        <label for="eventsEnd" class="form-label">End:</label>
                        <input type="date" id="eventsEnd" class="form-control" />
                    </div>
                    <div class="control-item" style="flex: 0 0 auto; align-self: flex-end;">
                        <button id="eventsApply" class="btn btn-secondary">Apply</button>
                    </div>
                    <div class="control-item" style="flex: 0 0 auto; align-self: flex-end;">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="events24Toggle" checked>
                            <label class="form-check-label" for="events24Toggle">24-hour</label>
                        </div>
                    </div>
                </div>

                <table id="eventsTable" class="table table-sm" style="max-width:720px;">
                    <thead>
                        <tr>
                            <th>Date / Time</th>
                            <th>Type</th>
                            <th>Depth</th>
                            <th>Duration</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTbody">
                    </tbody>
                </table>
            </div>
            <!-- Weather widget removed (placeholder data) -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="generate_graph.js"></script>
</body>

</html>
